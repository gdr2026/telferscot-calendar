<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telferscot Parent Calendar</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

.header { background: linear-gradient(135deg, #0d1b3e 0%, #1a2f5e 100%); color: white; padding: 16px 24px; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.header-logo { background: #f5c518; border-radius: 10px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.header-logo svg { width: 22px; height: 22px; fill: #0d1b3e; }
.header h1 { font-size: 1.2rem; font-weight: 700; color: #f5c518; }
.header p { font-size: 0.75rem; opacity: 0.7; margin-top: 1px; }

.top-bar { background: white; border-bottom: 1px solid #e2e8f0; padding: 10px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.class-bar-inner { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; flex: 1; }
.top-bar label { font-size: 0.8rem; font-weight: 600; color: #4a5568; white-space: nowrap; }
.class-btn { padding: 5px 13px; border-radius: 20px; border: 2px solid #cbd5e0; background: white; font-size: 0.78rem; cursor: pointer; transition: all 0.18s; font-weight: 500; color: #4a5568; }
.class-btn:hover { border-color: #1a2f5e; color: #1a2f5e; }
.class-btn.active { background: #0d1b3e; border-color: #0d1b3e; color: #f5c518; font-weight: 600; }
.view-switcher { display: flex; gap: 4px; background: #f0f4f8; border-radius: 10px; padding: 3px; flex-shrink: 0; }
.view-btn { padding: 5px 14px; border-radius: 7px; border: none; background: none; font-size: 0.78rem; font-weight: 600; color: #718096; cursor: pointer; transition: all 0.18s; }
.view-btn.active { background: #0d1b3e; color: #f5c518; }

.main { display: grid; grid-template-columns: 1fr 310px; gap: 18px; padding: 18px 24px; max-width: 1200px; margin: 0 auto; }
@media (max-width: 820px) { .main { grid-template-columns: 1fr; } }

.card { background: white; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
.card-header { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 8px; background: #f8f9ff; }
.card-header h3 { font-size: 0.92rem; font-weight: 700; color: #0d1b3e; flex: 1; }
.badge { background: #e53e3e; color: white; border-radius: 10px; font-size: 0.68rem; padding: 1px 7px; font-weight: 700; }

/* ── CAL NAV ── */
.cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; }
.cal-nav h2 { font-size: 1rem; font-weight: 700; }
.nav-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #1a2f5e; padding: 3px 9px; border-radius: 7px; }
.nav-btn:hover { background: #eef1f8; }

/* ── MONTH VIEW ── */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-day-header { text-align: center; font-size: 0.68rem; font-weight: 700; color: #718096; padding: 7px 4px; background: #f7fafc; border-bottom: 1px solid #e2e8f0; }
.cal-cell { min-height: 88px; padding: 5px 4px; border-right: 1px solid #f0f4f8; border-bottom: 1px solid #f0f4f8; cursor: pointer; transition: background 0.12s; }
.cal-cell:hover { background: #f7faff; }
.cal-cell.other-month { opacity: 0.3; pointer-events: none; }
.cal-cell.today { background: #eef1f8; }
.cal-cell.holiday { background: #f4f4f4; }
.cal-cell.today .day-num { background: #0d1b3e; color: #f5c518; border-radius: 50%; }
.day-num { font-size: 0.78rem; font-weight: 600; color: #2d3748; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }
.event-pill { font-size: 0.6rem; border-radius: 4px; padding: 2px 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; font-weight: 500; }
.pill-trip{background:#bee3f8;color:#2c5282}.pill-action{background:#fef3c7;color:#92400e}.pill-show{background:#e9d8fd;color:#553c9a}.pill-closure{background:#e2e8f0;color:#4a5568}.pill-general{background:#f7fafc;color:#a0aec0}
.more-events { font-size: 0.58rem; color: #718096; padding: 0 2px; }

/* ── WEEK VIEW ── */
.week-grid { display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid #e2e8f0; }
.week-col { border-right: 1px solid #f0f4f8; }
.week-col:last-child { border-right: none; }
.week-col-header { padding: 8px 6px; text-align: center; border-bottom: 1px solid #e2e8f0; }
.week-col-header .wch-day { font-size: 0.7rem; font-weight: 700; color: #718096; text-transform: uppercase; }
.week-col-header .wch-date { font-size: 1rem; font-weight: 700; color: #1a202c; margin-top: 1px; }
.week-col-header.today-col .wch-date { background: #0d1b3e; color: #f5c518; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; margin: 1px auto 0; }
.week-col-header.holiday-col { background: #fff5f5; }
.week-col-body { padding: 6px 5px; min-height: 160px; }
.week-event { font-size: 0.68rem; border-radius: 5px; padding: 3px 5px; margin-bottom: 3px; font-weight: 500; cursor: pointer; line-height: 1.4; }

/* ── DAY VIEW ── */
.day-view { padding: 16px; }
.day-date-label { font-size: 0.95rem; font-weight: 700; color: #0d1b3e; margin-bottom: 12px; }
.day-section-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #718096; margin: 12px 0 6px; }
.day-event-row { display: flex; gap: 10px; align-items: flex-start; padding: 8px 10px; border-radius: 8px; background: #f7fafc; margin-bottom: 6px; cursor: pointer; }
.day-event-row:hover { background: #eef1f8; }
.day-event-icon { font-size: 1rem; flex-shrink: 0; }
.day-event-title { font-size: 0.82rem; font-weight: 600; color: #1a202c; }
.day-event-sub { font-size: 0.72rem; color: #718096; margin-top: 2px; }
.day-empty { font-size: 0.82rem; color: #718096; padding: 20px; text-align: center; }

.legend { display: flex; flex-wrap: wrap; gap: 7px; padding: 9px 16px; border-top: 1px solid #f0f4f8; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.68rem; color: #4a5568; }
.legend-dot { width: 9px; height: 9px; border-radius: 2px; }
.status-bar { font-size: 0.72rem; color: #718096; padding: 7px 16px; border-top: 1px solid #f0f4f8; display: flex; align-items: center; gap: 6px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #48bb78; }

/* Sidebar */
.sidebar { display: flex; flex-direction: column; gap: 14px; }
.alert-item { padding: 10px 16px; border-bottom: 1px solid #f0f4f8; display: flex; gap: 10px; align-items: flex-start; }
.alert-item:last-child { border-bottom: none; }
.alert-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.alert-title { font-size: 0.82rem; font-weight: 600; color: #2d3748; }
.alert-date { font-size: 0.72rem; color: #718096; margin-top: 2px; }
.alert-tag { display: inline-block; font-size: 0.66rem; padding: 2px 6px; border-radius: 10px; font-weight: 600; margin-top: 3px; }
.tag-urgent{background:#fed7d7;color:#822727}.tag-week{background:#fef3c7;color:#92400e}
.alerts-section-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #718096; padding: 7px 16px 3px; background: #f7fafc; border-bottom: 1px solid #f0f4f8; }
.alerts-empty { padding: 8px 16px; font-size: 0.78rem; color: #718096; }


/* Event modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:16px;padding:22px;max-width:440px;width:90%;max-height:80vh;overflow-y:auto}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px}
.modal h2{font-size:1rem;font-weight:700;color:#0d1b3e}
.modal .modal-date{color:#718096;font-size:0.8rem;margin-bottom:12px}
.modal .event-row{padding:10px 0;border-bottom:1px solid #f0f4f8}
.modal .event-row:last-child{border-bottom:none}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:#718096;flex-shrink:0}
.event-name{font-size:0.88rem;font-weight:600;color:#1a202c}
.event-action-note{font-size:0.75rem;color:#c05621;margin-top:3px}
.event-link a{font-size:0.72rem;color:#1a2f5e}

.bring-icon{width:14px;height:14px;vertical-align:middle;margin-right:2px;display:inline-block}
.loading{padding:32px;text-align:center;color:#718096}
.spin{display:inline-block;animation:spin 1s linear infinite;font-size:1.4rem}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>

function classify(t){const s=t.toLowerCase();if(closureKw.some(k=>s.includes(k)))return'closure';if(actionKw.some(k=>s.includes(k)))return'action';if(showKw.some(k=>s.includes(k)))return'show';if(tripKw.some(k=>s.includes(k)))return'trip';return'general';}
function pillCls(type){return{closure:'pill-closure',action:'pill-action',show:'pill-show',trip:'pill-trip',general:'pill-general'}[type]||'pill-general';}
function isRelevant(ev,yrs){const t=ev.title.toLowerCase();if(schoolWide.some(k=>t.includes(k)))return true;if(yrs.has('all'))return true;for(const yr of yrs){if((yearKw[yr]||[]).some(k=>t.includes(k)))return true;}return false;}
function pd(s){return new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function fmtDate(d){return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}

  const now=new Date();
  const first=new Date(cY,cM,1),last=new Date(cY,cM+1,0);

  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>{html+=`<div class="cal-day-header">${d}</div>`;});
  const startDow=(first.getDay()+6)%7;

// ── DAY VIEW ──
function renderDay(){
  document.getElementById('navTitle').textContent=cD.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const evs=eventsForDate(cD);
  let html='<div class="day-view">';
  if(evs.length){
    html+='<div class="day-section-label">Events</div>';
    evs.forEach(ev=>{
      const icon=evIcons[ev.type]||'📌';
      html+=`<div class="day-event-row" onclick="openModal('${cD.toISOString()}')">
        <div class="day-event-icon">${icon}</div>
        <div><div class="day-event-title">${ev.title}</div></div>
      </div>`;
    });
  } else {
    html+='<div class="day-empty">No school events today.</div>';
  }
  html+='</div>';
  document.getElementById('calBody').innerHTML=html;
}

function renderView(){
  if(view==='month')renderMonth();
  else if(view==='week')renderWeek();
  else renderDay();
}

function goToDay(iso){
  cD=new Date(iso);cY=cD.getFullYear();cM=cD.getMonth();
  setView('day');
}

function setView(v){
  view=v;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  document.getElementById('calLegend').style.display=v==='month'?'flex':'none';
  renderView();
}

// nav
document.getElementById('prevBtn').onclick=()=>{
  if(view==='month'){cM--;if(cM<0){cM=11;cY--;}}
  else if(view==='week'){cD=new Date(cD);cD.setDate(cD.getDate()-7);}
  else{cD=new Date(cD);cD.setDate(cD.getDate()-1);}
  renderView();
};
document.getElementById('nextBtn').onclick=()=>{
  if(view==='month'){cM++;if(cM>11){cM=0;cY++;}}
  else if(view==='week'){cD=new Date(cD);cD.setDate(cD.getDate()+7);}
  else{cD=new Date(cD);cD.setDate(cD.getDate()+1);}
  renderView();
};
document.querySelectorAll('.view-btn').forEach(b=>b.onclick=()=>setView(b.dataset.view));

// class filter
document.querySelectorAll('.class-btn').forEach(btn=>{
  btn.onclick=()=>{
    const yr=btn.dataset.year;
    if(yr==='all'){selectedYears=new Set(['all']);document.querySelectorAll('.class-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
    else{
      selectedYears.delete('all');document.querySelector('[data-year="all"]').classList.remove('active');
      if(btn.classList.contains('active')){btn.classList.remove('active');selectedYears.delete(yr);if(selectedYears.size===0){selectedYears.add('all');document.querySelector('[data-year="all"]').classList.add('active');}}
      else{btn.classList.add('active');selectedYears.add(yr);}
    }
    filteredEvents=allEvents.filter(ev=>isRelevant(ev,selectedYears));
    renderView();renderAlerts();renderUpcoming();
  };
});

// ── ALERTS ──
function alertRow(ev,now){
  const days=Math.round((ev.start-now)/864e5);

function renderAlerts(){
  const now=new Date();now.setHours(0,0,0,0);
  const in7=new Date(now);in7.setDate(in7.getDate()+7);
  const acts=filteredEvents.filter(ev=>ev.type==='action'&&ev.start>=now&&ev.start<=in7).sort((a,b)=>a.start-b.start);
  document.getElementById('alertBadge').textContent=acts.length;
  if(!acts.length){document.getElementById('alertsList').innerHTML=`<div class="alert-item"><div class="alert-icon">✅</div><div><div class="alert-title">No action items this week</div></div></div>`;return;}
  const todays=acts.filter(ev=>sameDay(ev.start,now));
  const upcoming=acts.filter(ev=>!sameDay(ev.start,now));
  let html=`<div class="alerts-section-label">Today</div>`;
  html+=todays.length?todays.map(ev=>alertRow(ev,now)).join(''):`<div class="alerts-empty">Nothing today.</div>`;
  if(upcoming.length){html+=`<div class="alerts-section-label">Coming up</div>`;html+=upcoming.map(ev=>alertRow(ev,now)).join('');}
  document.getElementById('alertsList').innerHTML=html;
}
function renderUpcoming(){
  const now=new Date();now.setHours(0,0,0,0);
  const tomorrow=new Date(now);tomorrow.setDate(tomorrow.getDate()+1);
  const up=filteredEvents.filter(ev=>ev.start>=tomorrow).sort((a,b)=>a.start-b.start).slice(0,8);
  let html='';
  up.forEach(ev=>{
    html+=`<div class="alert-item"><div class="alert-icon">${evIcons[ev.type]||'📌'}</div><div><div class="alert-title">${ev.title.slice(0,50)}${ev.title.length>50?'…':''}</div><div class="alert-date">${fmtDate(ev.start)}</div></div></div>`;
  });
  document.getElementById('upcomingList').innerHTML=html||'<div class="loading" style="padding:14px">No upcoming events</div>';
}

function parseIcal(text){
  const evs=[];
  text.split('BEGIN:VEVENT').slice(1).forEach(block=>{
    const get=k=>{const m=block.match(new RegExp(k+':([^\r\n]+)'));return m?m[1].trim():'';};
    const title=get('SUMMARY').replace(/\\,/g,',').replace(/\\n/g,' ');
    const ds=get('DTSTART'),de=get('DTEND');
    if(!title||!ds)return;
    const start=pd(ds.replace(/T.*/,'')),end=de?pd(de.replace(/T.*/,'')):null;
    if(!start)return;
    evs.push({title,start,end,url:get('URL;VALUE=URI')||get('URL'),type:classify(title)});
  });
  return evs;
}
